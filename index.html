<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptionsWatch Pro</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --cyan: #39d0d8;
    --purple: #bc8cff;
    --orange: #ffa657;
    --pass: #238636;
    --fail: #da3633;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    font-size: 14px;
    min-height: 100vh;
  }
  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
  header span { font-size: 11px; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }

  /* TABS */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 24px;
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* SEARCH BAR */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    align-items: center;
  }
  .ticker-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 16px;
    width: 140px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.15s;
  }
  .ticker-input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* STATUS */
  .status-msg {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 8px;
  }
  .status-msg.loading { color: var(--yellow); }
  .status-msg.error { color: var(--red); }
  .status-msg.ok { color: var(--green); }

  /* PRICE BAR */
  .price-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .price-bar .ticker-label { font-size: 22px; font-weight: 800; color: var(--accent); }
  .price-bar .price { font-size: 26px; font-weight: 700; }
  .stat-group { display: flex; flex-direction: column; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 15px; font-weight: 600; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .neutral { color: var(--text-muted); }

  /* SCORECARD */
  .scorecard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .scorecard h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }
  .criteria-list { display: flex; flex-direction: column; gap: 8px; }
  .criterion {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .criterion .badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .badge.pass { background: var(--pass); color: #fff; }
  .badge.fail { background: var(--fail); color: #fff; }
  .badge.na { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
  .criterion .crit-label { font-weight: 600; flex: 1; }
  .criterion .crit-val { font-size: 12px; color: var(--text-muted); }
  .rank-badge {
    font-size: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* SCORE SUMMARY */
  .score-summary {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .score-summary.strong { background: rgba(35,134,54,0.2); border: 1px solid var(--pass); }
  .score-summary.moderate { background: rgba(210,153,34,0.15); border: 1px solid var(--yellow); }
  .score-summary.weak { background: rgba(218,54,51,0.15); border: 1px solid var(--fail); }
  .score-label { font-weight: 700; font-size: 15px; }
  .score-num { font-size: 22px; font-weight: 800; }

  /* INFO BOX */
  .info-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .info-item .info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .info-item .info-val { font-size: 16px; font-weight: 700; color: var(--cyan); }

  /* CHAIN TABLE */
  .chain-section { margin-bottom: 20px; }
  .chain-section h3 { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .chain-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    padding: 8px 12px;
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(88,166,255,0.05); }
  tbody tr.recommended { background: rgba(57,208,216,0.08); }
  tbody td {
    padding: 8px 12px;
    text-align: right;
    font-size: 13px;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; }
  .star { color: var(--cyan); font-size: 14px; margin-right: 4px; }
  .strike-cell { font-weight: 700; color: var(--text); }

  /* LEAPS TABLE */
  .leaps-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px; }

  /* SYNTHETIC SCENARIOS */
  .scenarios { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .scenario-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .scenario-card h4 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .scenario-card .sc-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .scenario-card .sc-row:last-child { border-bottom: none; }
  .scenario-card .sc-key { color: var(--text-muted); font-size: 12px; }
  .scenario-card .sc-val { font-weight: 600; font-size: 13px; }

  /* PLACEHOLDER */
  .placeholder {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .placeholder .ph-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .placeholder p { font-size: 15px; }

  /* PANEL VISIBILITY */
  .panel { display: none; }
  .panel.active { display: block; }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NOTICE */
  .notice {
    background: rgba(210,153,34,0.12);
    border: 1px solid var(--yellow);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--yellow);
    margin-bottom: 16px;
  }

  /* BTC NOTE */
  .btc-note {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 10px;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 16px; }
    .price-bar { gap: 16px; }
    .tab { padding: 10px 12px; font-size: 12px; }
    header h1 { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <h1>OptionsWatch Pro</h1>
  <span>Options Trading Analyzer</span>
</header>

<div class="tab-bar">
  <div class="tab active" data-tab="put">Cash-Secured Put</div>
  <div class="tab" data-tab="cc">Covered Call</div>
  <div class="tab" data-tab="leaps">LEAPS</div>
  <div class="tab" data-tab="synth">Synthetic Long</div>
</div>

<!-- ===================== PUT PANEL ===================== -->
<div id="panel-put" class="panel active">
  <div class="container">
    <div class="search-row">
      <input type="text" class="ticker-input" id="put-ticker" placeholder="TICKER" maxlength="10" />
      <button class="btn" id="put-btn" onclick="runPut()">Analyze</button>
      <span class="status-msg" id="put-status"></span>
    </div>
    <div id="put-results"></div>
  </div>
</div>

<!-- ===================== CC PANEL ===================== -->
<div id="panel-cc" class="panel">
  <div class="container">
    <div class="search-row">
      <input type="text" class="ticker-input" id="cc-ticker" placeholder="TICKER" maxlength="10" />
      <button class="btn" id="cc-btn" onclick="runCC()">Analyze</button>
      <span class="status-msg" id="cc-status"></span>
    </div>
    <div id="cc-results"></div>
  </div>
</div>

<!-- ===================== LEAPS PANEL ===================== -->
<div id="panel-leaps" class="panel">
  <div class="container">
    <div class="search-row">
      <input type="text" class="ticker-input" id="leaps-ticker" placeholder="TICKER" maxlength="10" />
      <button class="btn" id="leaps-btn" onclick="runLeaps()">Analyze</button>
      <span class="status-msg" id="leaps-status"></span>
    </div>
    <div id="leaps-results"></div>
  </div>
</div>

<!-- ===================== SYNTH PANEL ===================== -->
<div id="panel-synth" class="panel">
  <div class="container">
    <div class="search-row">
      <input type="text" class="ticker-input" id="synth-ticker" placeholder="TICKER" maxlength="10" />
      <button class="btn" id="synth-btn" onclick="runSynth()">Analyze</button>
      <span class="status-msg" id="synth-status"></span>
    </div>
    <div id="synth-results"></div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const TD_KEY   = '170a58b2c2094e3987e4289f4fe39a08';
const CF_PROXY = 'https://marketwatchpro.mattdavis-7f2.workers.dev/';

// ─── TABS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    var panelId = 'panel-' + tab.dataset.tab;
    document.getElementById(panelId).classList.add('active');
  });
});

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  el.innerHTML = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}

function spinner() {
  return '<span class="spinner"></span>';
}

function fmt(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toFixed(dec !== undefined ? dec : 2);
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (Number(n) * 100).toFixed(1) + '%';
}

function fmtDollar(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Number(n).toFixed(2);
}

function fmtK(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function dteFromStr(dateStr) {
  if (!dateStr) return null;
  var parts = dateStr.split('-');
  if (parts.length !== 3) return null;
  var exp = new Date(Date.UTC(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])));
  var now = new Date();
  var todayUTC = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  return Math.round((exp - todayUTC) / 86400000);
}

function isThirdFriday(dateStr) {
  var parts = dateStr.split('-');
  var d = new Date(Date.UTC(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])));
  if (d.getUTCDay() !== 5) return false;
  var day = d.getUTCDate();
  return day >= 15 && day <= 21;
}

function passHtml(pass) {
  if (pass === true)  return '<span class="badge pass">✓</span>';
  if (pass === false) return '<span class="badge fail">✗</span>';
  return '<span class="badge na">—</span>';
}

function scoreClass(score, total) {
  var pct = score / total;
  if (pct >= 0.75) return 'strong';
  if (pct >= 0.5)  return 'moderate';
  return 'weak';
}

function scoreLabel(score, total) {
  var pct = score / total;
  if (pct >= 0.75) return '✅ Strong Setup';
  if (pct >= 0.5)  return '⚠️ Moderate Setup';
  return '❌ Weak Setup';
}

// ─── API CALLS ────────────────────────────────────────────────────────────────
async function fetchTD(endpoint, params) {
  var url = new URL('https://api.twelvedata.com/' + endpoint);
  params['apikey'] = TD_KEY;
  Object.keys(params).forEach(function(k) { url.searchParams.set(k, params[k]); });
  var r = await fetch(url.toString());
  if (!r.ok) throw new Error('Twelve Data HTTP ' + r.status);
  var data = await r.json();
  if (data.status === 'error') throw new Error('TD: ' + (data.message || 'API error'));
  return data;
}

async function fetchMD(endpoint, params) {
  // Worker uses 'path' param and BASE = 'https://api.marketdata.app/v1'
  // so strip leading /v1/ from endpoint before passing as path
  var path = endpoint.replace(/^\/v1\//, '');
  var url = new URL(CF_PROXY);
  url.searchParams.set('path', path);
  if (params) {
    Object.keys(params).forEach(function(k) { url.searchParams.set(k, params[k]); });
  }
  var r = await fetch(url.toString());
  if (!r.ok) {
    var errText = await r.text();
    throw new Error('MarketData HTTP ' + r.status + ': ' + errText);
  }
  var data = await r.json();
  if (data.s === 'no_data') throw new Error('No options data available for this symbol.');
  return data;
}

// Fetch price, RSI(10), 200 SMA from Twelve Data
async function fetchPriceData(ticker) {
  var [quoteData, rsiData, smaData] = await Promise.all([
    fetchTD('quote', { symbol: ticker }),
    fetchTD('rsi', { symbol: ticker, interval: '1day', time_period: 10, outputsize: 1 }),
    fetchTD('sma', { symbol: ticker, interval: '1day', time_period: 200, outputsize: 1 })
  ]);

  var price = parseFloat(quoteData.close || quoteData.price);
  var change = parseFloat(quoteData.change);
  var changePct = parseFloat(quoteData.percent_change);
  var rsi = parseFloat(rsiData.values && rsiData.values[0] ? rsiData.values[0].rsi : rsiData.rsi);
  var sma200 = parseFloat(smaData.values && smaData.values[0] ? smaData.values[0].sma : smaData.sma);

  return { price, change, changePct, rsi, sma200 };
}

// Fetch IV Rank from MarketData
async function fetchIVRank(ticker) {
  try {
    var data = await fetchMD('/v1/options/ivrank/', { symbol: ticker });
    if (data && data.ivRank && data.ivRank[0] !== undefined) {
      return parseFloat(data.ivRank[0]) * 100; // convert 0-1 to 0-100
    }
    return null;
  } catch(e) {
    return null;
  }
}

// Fetch expirations from MarketData
async function fetchExpirations(ticker) {
  var data = await fetchMD('/v1/options/expirations/', { symbol: ticker });
  return data.expirations || [];
}

// Fetch options chain for a specific expiration
async function fetchChain(ticker, expiration, side) {
  var data = await fetchMD('/v1/options/chain/', {
    symbol: ticker,
    expiration: expiration,
    side: side
  });
  return data;
}

// Find best expiry in DTE window
function findBestExpiry(expirations, minDTE, maxDTE) {
  var candidates = expirations.filter(function(e) {
    var dte = dteFromStr(e);
    return dte >= minDTE && dte <= maxDTE;
  });
  // Prefer standard monthly (3rd Friday)
  var monthly = candidates.filter(isThirdFriday);
  if (monthly.length > 0) return monthly[0];
  if (candidates.length > 0) return candidates[0];
  return null;
}

// ─── PRICE BAR HTML ──────────────────────────────────────────────────────────
function priceBarHtml(ticker, pd) {
  var chgColor = pd.change >= 0 ? 'up' : 'down';
  var chgSign  = pd.change >= 0 ? '+' : '';
  var aboveSMA = pd.price > pd.sma200;

  return '<div class="price-bar">' +
    '<span class="ticker-label">' + ticker + '</span>' +
    '<span class="price ' + chgColor + '">' + fmtDollar(pd.price) +
      '<span style="font-size:14px;margin-left:8px">' + chgSign + fmt(pd.change) + ' (' + chgSign + fmt(pd.changePct,2) + '%)</span>' +
    '</span>' +
    '<div class="stat-group"><span class="stat-label">RSI(10)</span><span class="stat-value ' + (pd.rsi < 30 ? 'down' : pd.rsi > 65 ? 'up' : '') + '">' + fmt(pd.rsi,1) + '</span></div>' +
    '<div class="stat-group"><span class="stat-label">200 SMA</span><span class="stat-value">' + fmtDollar(pd.sma200) + '</span></div>' +
    '<div class="stat-group"><span class="stat-label">vs 200 SMA</span><span class="stat-value ' + (aboveSMA ? 'up' : 'down') + '">' + (aboveSMA ? '▲ Above' : '▼ Below') + '</span></div>' +
  '</div>';
}

// ─── CRITERION ROW ───────────────────────────────────────────────────────────
function critRow(rank, label, pass, valStr) {
  return '<div class="criterion">' +
    '<span class="rank-badge">#' + rank + '</span>' +
    passHtml(pass) +
    '<span class="crit-label">' + label + '</span>' +
    '<span class="crit-val">' + (valStr || '') + '</span>' +
  '</div>';
}

// ─── CHAIN TABLE (Puts) ───────────────────────────────────────────────────────
function buildPutChainTable(chain, targetDelta, price, strike) {
  // chain = MarketData response object
  var rows = [];
  if (!chain || !chain.optionSymbol) return '<p style="color:var(--text-muted);font-size:12px">No chain data.</p>';

  for (var i = 0; i < chain.optionSymbol.length; i++) {
    rows.push({
      strike:  chain.strike ? chain.strike[i] : null,
      bid:     chain.bid ? chain.bid[i] : null,
      ask:     chain.ask ? chain.ask[i] : null,
      mid:     chain.mid ? chain.mid[i] : null,
      delta:   chain.delta ? chain.delta[i] : null,
      iv:      chain.iv ? chain.iv[i] : null,
      oi:      chain.openInterest ? chain.openInterest[i] : null,
      volume:  chain.volume ? chain.volume[i] : null
    });
  }

  // Sort by strike ascending
  rows.sort(function(a, b) { return a.strike - b.strike; });

  // Find best fit row (closest to targetDelta by abs value, within 0.15-0.25)
  var bestIdx = -1;
  var bestDiff = Infinity;
  for (var j = 0; j < rows.length; j++) {
    var d = Math.abs(rows[j].delta || 0);
    if (d >= 0.10 && d <= 0.35) {
      var diff = Math.abs(d - Math.abs(targetDelta));
      if (diff < bestDiff) { bestDiff = diff; bestIdx = j; }
    }
  }

  // Center ±4 rows around bestIdx
  var startIdx = Math.max(0, bestIdx - 4);
  var endIdx   = Math.min(rows.length - 1, bestIdx + 4);
  var slice    = rows.slice(startIdx, endIdx + 1);
  var bestInSlice = bestIdx - startIdx;

  var html = '<div class="chain-table-wrap"><table>' +
    '<thead><tr>' +
    '<th>Strike</th><th>Bid</th><th>Ask</th><th>Mid</th>' +
    '<th>Delta</th><th>IV</th><th>OI</th><th>Volume</th>' +
    '<th>Prem %</th>' +
    '</tr></thead><tbody>';

  slice.forEach(function(row, idx) {
    var isRec  = idx === bestInSlice;
    var premPct = (row.mid && price) ? (row.mid / price * 100) : null;
    html += '<tr class="' + (isRec ? 'recommended' : '') + '">' +
      '<td class="strike-cell">' + (isRec ? '<span class="star">★</span>' : '') + fmtDollar(row.strike) + '</td>' +
      '<td>' + fmtDollar(row.bid) + '</td>' +

      '<td>' + (premPct !== null ? fmt(premPct, 2) + '%' : '—') + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

// ─── CHAIN TABLE (Calls — CC) ─────────────────────────────────────────────────
function buildCallChainTable(chain, targetDelta, price) {
  var rows = [];
  if (!chain || !chain.optionSymbol) return '<p style="color:var(--text-muted);font-size:12px">No chain data.</p>';

  for (var i = 0; i < chain.optionSymbol.length; i++) {
    rows.push({
      strike: chain.strike ? chain.strike[i] : null,
      bid:    chain.bid ? chain.bid[i] : null,
      ask:    chain.ask ? chain.ask[i] : null,
      mid:    chain.mid ? chain.mid[i] : null,
      delta:  chain.delta ? chain.delta[i] : null,
      iv:     chain.iv ? chain.iv[i] : null,
      oi:     chain.openInterest ? chain.openInterest[i] : null,
      volume: chain.volume ? chain.volume[i] : null
    });
  }

  rows.sort(function(a, b) { return a.strike - b.strike; });

  var bestIdx  = -1;
  var bestDiff = Infinity;
  for (var j = 0; j < rows.length; j++) {
    var d = rows[j].delta || 0;
    if (d >= 0.10 && d <= 0.35) {
      var diff = Math.abs(d - targetDelta);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = j; }
    }
  }

  var startIdx     = Math.max(0, bestIdx - 4);
  var endIdx       = Math.min(rows.length - 1, bestIdx + 4);
  var slice        = rows.slice(startIdx, endIdx + 1);
  var bestInSlice  = bestIdx - startIdx;

  var html = '<div class="chain-table-wrap"><table>' +
    '<thead><tr>' +
    '<th>Strike</th><th>Bid</th><th>Ask</th><th>Mid</th>' +
    '<th>Delta</th><th>IV</th><th>OI</th><th>Volume</th>' +
    '<th>Prem %</th>' +
    '</tr></thead><tbody>';

  slice.forEach(function(row, idx) {
    var isRec   = idx === bestInSlice;
    var premPct = (row.mid && price) ? (row.mid / price * 100) : null;
    html += '<tr class="' + (isRec ? 'recommended' : '') + '">' +
      '<td class="strike-cell">' + (isRec ? '<span class="star">★</span>' : '') + fmtDollar(row.strike) + '</td>' +
      '<td>' + fmtDollar(row.bid) + '</td>' +
      '<td>' + fmtDollar(row.ask) + '</td>' +
      '<td><strong>' + fmtDollar(row.mid) + '</strong></td>' +
      '<td>' + fmt(row.delta, 2) + '</td>' +
      '<td>' + (row.iv ? fmt(row.iv * 100, 1) + '%' : '—') + '</td>' +
      '<td>' + fmtK(row.oi) + '</td>' +
      '<td>' + fmtK(row.volume) + '</td>' +
      '<td>' + (premPct !== null ? fmt(premPct, 2) + '%' : '—') + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

// ─── EARNINGS CHECK ──────────────────────────────────────────────────────────
async function checkEarnings(ticker, expiryStr) {
  // Returns: true = earnings BEFORE expiry (bad), false = safe
  try {
    var data = await fetchTD('earnings', { symbol: ticker, outputsize: 2 });
    if (!data.earnings && !data.data) return false;
    var earningsList = data.earnings || data.data || [];
    var expiryDate   = new Date(expiryStr);
    var today        = new Date();
    for (var i = 0; i < earningsList.length; i++) {
      var eDate = new Date(earningsList[i].date || earningsList[i].datetime);
      if (eDate > today && eDate < expiryDate) return true;
    }
    return false;
  } catch(e) {
    return null; // unknown
  }
}

          var years2 = dte / 365;
          var be2    = chain.strike[i] + (mid2 || 0);
          var cagr2  = (be2 && pd.price && years2 > 0) ? (Math.pow(be2 / pd.price, 1 / years2) - 1) * 100 : null;
          rows2.push({
            strike: chain.strike[i],
            bid: bid2, ask: ask2, mid: mid2,
            delta: d, oi: oi2,
            spread: spread, cagr: cagr2
          });
        }
      }

      rows2.sort(function(a, b) { return a.strike - b.strike; });

      var bestInRows = -1;
      var bestDiffL  = Infinity;
      rows2.forEach(function(r, ri) {
        var diff = Math.abs(r.delta - 0.75);
        if (diff < bestDiffL) { bestDiffL = diff; bestInRows = ri; }
      });

      html += '<div class="leaps-table-wrap"><table><thead><tr>' +
        '<th>Strike</th><th>Bid</th><th>Ask</th><th>Mid</th>' +
        '<th>Delta</th><th>OI</th><th>Spread%</th><th>CAGR%</th>' +
        '</tr></thead><tbody>';

      rows2.forEach(function(row, ri) {
        var isRec3 = ri === bestInRows;
        html += '<tr class="' + (isRec3 ? 'recommended' : '') + '">' +
          '<td class="strike-cell">' + (isRec3 ? '<span class="star">★</span>' : '') + fmtDollar(row.strike) + '</td>' +
          '<td>' + fmtDollar(row.bid) + '</td>' +
          '<td>' + fmtDollar(row.ask) + '</td>' +
          '<td><strong>' + fmtDollar(row.mid) + '</strong></td>' +
          '<td>' + fmt(row.delta, 2) + '</td>' +
          '<td>' + fmtK(row.oi) + '</td>' +
          '<td ' + (row.spread !== null && row.spread > 10 ? 'style="color:var(--red)"' : '') + '>' + (row.spread !== null ? fmt(row.spread,1) + '%' : '—') + '</td>' +
          '<td ' + (row.cagr !== null && row.cagr > 35 ? 'style="color:var(--red)"' : 'style="color:var(--green)"') + '>' + (row.cagr !== null ? fmt(row.cagr,1) + '%' : '—') + '</td>' +
        '</tr>';
      });

      html += '</tbody></table></div>';
    });
    html += '</div>';

    document.getElementById('leaps-results').innerHTML = html;

  } catch(err) {
    setStatus('leaps-status', '✗ ' + err.message, 'error');
    document.getElementById('leaps-results').innerHTML = '<div class="notice">Error: ' + err.message + '</div>';
  } finally {
    btn.disabled = false;
  }
}

// ─── SYNTHETIC LONG ANALYZER ─────────────────────────────────────────────────
async function runSynth() {
  var ticker = document.getElementById('synth-ticker').value.trim().toUpperCase();
  if (!ticker) return;

  var btn = document.getElementById('synth-btn');
  btn.disabled = true;
  setStatus('synth-status', spinner() + 'Fetching data…', 'loading');
  document.getElementById('synth-results').innerHTML = '';

  try {
    setStatus('synth-status', spinner() + 'Loading price & indicators…', 'loading');
    var pd = await fetchPriceData(ticker);

    setStatus('synth-status', spinner() + 'Loading expirations…', 'loading');
    var expirations = await fetchExpirations(ticker);

    // Find furthest expiry >= 365 DTE
    var synthExpiries = expirations.filter(function(e) {
      return dteFromStr(e) >= 365;
    });
    if (synthExpiries.length === 0) throw new Error('No expirations ≥ 365 days found.');

    // Sort descending to get furthest
    synthExpiries.sort(function(a, b) { return dteFromStr(b) - dteFromStr(a); });
    var bestExpiry  = synthExpiries[0];
    var dte         = dteFromStr(bestExpiry);

    setStatus('synth-status', spinner() + 'Fetching call and put chains…', 'loading');
    var [callChain, putChain] = await Promise.all([
      fetchChain(ticker, bestExpiry, 'call'),
      fetchChain(ticker, bestExpiry, 'put')
    ]);

    // Find ATM call (delta 0.45–0.55)
    var atmCall = null;
    if (callChain && callChain.strike) {
      var bestAtmDiff = Infinity;
      for (var i = 0; i < callChain.strike.length; i++) {
        var d = callChain.delta ? callChain.delta[i] : null;
        if (d === null) continue;
        var diff = Math.abs(d - 0.50);
        if (d >= 0.40 && d <= 0.60 && diff < bestAtmDiff) {
          bestAtmDiff = diff;
          atmCall = {
            strike:  callChain.strike[i],
            bid:     callChain.bid ? callChain.bid[i] : null,
            ask:     callChain.ask ? callChain.ask[i] : null,
            mid:     callChain.mid ? callChain.mid[i] : null,
            delta:   d,
            oi:      callChain.openInterest ? callChain.openInterest[i] : null
          };
        }
      }
    }
    if (!atmCall) throw new Error('Could not find ATM call (delta 0.45–0.55).');

    // Find ATM put at same strike
    var atmPut = null;
    if (putChain && putChain.strike) {
      var closestStrikeDiff = Infinity;
      for (var j = 0; j < putChain.strike.length; j++) {
        var diff4 = Math.abs(putChain.strike[j] - atmCall.strike);
        if (diff4 < closestStrikeDiff) {
          closestStrikeDiff = diff4;
          atmPut = {
            strike: putChain.strike[j],
            bid:    putChain.bid ? putChain.bid[j] : null,
            ask:    putChain.ask ? putChain.ask[j] : null,
            mid:    putChain.mid ? putChain.mid[j] : null,
            delta:  putChain.delta ? putChain.delta[j] : null,
            oi:     putChain.openInterest ? putChain.openInterest[j] : null
          };
        }
      }
    }
    if (!atmPut) throw new Error('Could not find ATM put at matching strike.');

    var netCost    = (atmCall.mid && atmPut.mid) ? (atmCall.mid - atmPut.mid) : null;
    var netCostPct = (netCost !== null && pd.price) ? (netCost / pd.price * 100) : null;

    var callSpread = (atmCall.bid && atmCall.ask) ? (atmCall.ask - atmCall.bid) : null;
    var putSpread  = (atmPut.bid && atmPut.ask)   ? (atmPut.ask - atmPut.bid)   : null;

    var aboveSMA = pd.price > pd.sma200;

    // Grade criteria
    var c1 = pd.rsi < 40;
    var c2 = aboveSMA;
    var c3 = atmCall.delta >= 0.45 && atmCall.delta <= 0.55;
    var c4 = dte >= 365;
    var c5 = netCostPct !== null ? netCostPct <= 3 : null;
    var c6 = (atmCall.oi !== null && atmPut.oi !== null) ? (atmCall.oi >= 200 && atmPut.oi >= 200) : null;
    var c7 = (callSpread !== null && putSpread !== null) ? (callSpread <= 1.0 && putSpread <= 1.0) : null;

    var criteria = [c1, c2, c3, c4, c5, c6, c7];
    var score    = criteria.filter(function(c) { return c === true; }).length;
    var sClass   = scoreClass(score, 7);
    var sLabel   = scoreLabel(score, 7);

    setStatus('synth-status', 'Done', 'ok');

    var html = priceBarHtml(ticker, pd);

    // Info box
    html += '<div class="info-box">' +
      '<div class="info-item"><div class="info-label">Strategy</div><div class="info-val">Synthetic Long</div></div>' +
      '<div class="info-item"><div class="info-label">Expiry</div><div class="info-val">' + bestExpiry + '</div></div>' +
      '<div class="info-item"><div class="info-label">DTE</div><div class="info-val">' + dte + '</div></div>' +
      '<div class="info-item"><div class="info-label">ATM Strike</div><div class="info-val">' + fmtDollar(atmCall.strike) + '</div></div>' +
      '<div class="info-item"><div class="info-label">Net Cost</div><div class="info-val">' + (netCost !== null ? fmtDollar(netCost) : '—') + '</div></div>' +
      '<div class="info-item"><div class="info-label">Net Cost % Price</div><div class="info-val">' + (netCostPct !== null ? fmt(netCostPct,2) + '%' : '—') + '</div></div>' +
    '</div>';

    // Legs info
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
    html += '<div class="scenario-card">';
    html += '<h4>BUY — Call Leg</h4>';
    html += '<div class="sc-row"><span class="sc-key">Strike</span><span class="sc-val">' + fmtDollar(atmCall.strike) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Bid / Ask</span><span class="sc-val">' + fmtDollar(atmCall.bid) + ' / ' + fmtDollar(atmCall.ask) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Mid</span><span class="sc-val">' + fmtDollar(atmCall.mid) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Delta</span><span class="sc-val">' + fmt(atmCall.delta, 2) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">OI</span><span class="sc-val">' + fmtK(atmCall.oi) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Spread</span><span class="sc-val ' + (callSpread && callSpread > 1 ? 'down' : 'up') + '">' + (callSpread !== null ? fmtDollar(callSpread) : '—') + '</span></div>';
    html += '</div>';

    html += '<div class="scenario-card">';
    html += '<h4>SELL — Put Leg</h4>';
    html += '<div class="sc-row"><span class="sc-key">Strike</span><span class="sc-val">' + fmtDollar(atmPut.strike) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Bid / Ask</span><span class="sc-val">' + fmtDollar(atmPut.bid) + ' / ' + fmtDollar(atmPut.ask) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Mid</span><span class="sc-val">' + fmtDollar(atmPut.mid) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Delta</span><span class="sc-val">' + fmt(atmPut.delta, 2) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">OI</span><span class="sc-val">' + fmtK(atmPut.oi) + '</span></div>';
    html += '<div class="sc-row"><span class="sc-key">Spread</span><span class="sc-val ' + (putSpread && putSpread > 1 ? 'down' : 'up') + '">' + (putSpread !== null ? fmtDollar(putSpread) : '—') + '</span></div>';
    html += '</div>';
    html += '</div>';

    // Scorecard
    html += '<div class="scorecard"><h3>Synthetic Long — Criteria Score</h3><div class="criteria-list">';
    html += critRow(1, 'RSI(10) < 40 (Bullish Momentum)', c1, fmt(pd.rsi,1));
    html += critRow(2, 'Price Above 200 SMA', c2, aboveSMA ? 'Above (' + fmtDollar(pd.sma200) + ')' : 'Below (' + fmtDollar(pd.sma200) + ')');
    html += critRow(3, 'ATM Call Delta 0.45–0.55', c3, fmt(atmCall.delta,2));
    html += critRow(4, 'Duration ≥ 365 Days', c4, dte + ' days');
    html += critRow(5, 'Net Cost ≤ 3% of Stock Price', c5, netCostPct !== null ? fmt(netCostPct,2) + '%' : 'N/A');
    html += critRow(6, 'Both Legs OI ≥ 200', c6, 'Call: ' + fmtK(atmCall.oi) + ' / Put: ' + fmtK(atmPut.oi));
    html += critRow(7, 'Both Spreads ≤ $1.00', c7, (callSpread !== null ? fmtDollar(callSpread) : '—') + ' / ' + (putSpread !== null ? fmtDollar(putSpread) : '—'));
    html += '</div>';
    html += '<div class="score-summary ' + sClass + '"><span class="score-label">' + sLabel + '</span><span class="score-num">' + score + '/7</span></div>';
    html += '</div>';

    // 3 Scenarios
    var strikes = [atmCall.strike, atmCall.strike + 5, atmCall.strike + 15];
    var labels  = ['ATM', 'Slight ITM', 'Deep ITM'];

    html += '<div class="chain-section"><h3>Position Scenarios</h3><div class="scenarios">';
    strikes.forEach(function(s, si) {
      var intrinsicGain = s - atmCall.strike;
      var pnl = intrinsicGain - (netCost || 0);
      var pnlPct = pd.price ? (pnl / pd.price * 100) : null;
      html += '<div class="scenario-card"><h4>' + labels[si] + ' — $' + s.toFixed(0) + ' Strike</h4>';
      html += '<div class="sc-row"><span class="sc-key">Net Cost</span><span class="sc-val">' + (netCost !== null ? fmtDollar(netCost) : '—') + '</span></div>';
      html += '<div class="sc-row"><span class="sc-key">Intrinsic Gain</span><span class="sc-val ' + (intrinsicGain >= 0 ? 'up' : 'down') + '">$' + intrinsicGain.toFixed(2) + '</span></div>';
      html += '<div class="sc-row"><span class="sc-key">Net P&L (at expiry)</span><span class="sc-val ' + (pnl >= 0 ? 'up' : 'down') + '">' + fmtDollar(pnl) + '</span></div>';
      html += '<div class="sc-row"><span class="sc-key">P&L % of Stock</span><span class="sc-val ' + (pnlPct !== null && pnlPct >= 0 ? 'up' : 'down') + '">' + (pnlPct !== null ? fmt(pnlPct,2) + '%' : '—') + '</span></div>';
      html += '</div>';
    });
    html += '</div></div>';

    document.getElementById('synth-results').innerHTML = html;

  } catch(err) {
    setStatus('synth-status', '✗ ' + err.message, 'error');
    document.getElementById('synth-results').innerHTML = '<div class="notice">Error: ' + err.message + '</div>';
  } finally {
    btn.disabled = false;
  }
}

// ─── ENTER KEY SUPPORT ────────────────────────────────────────────────────────
document.getElementById('put-ticker').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runPut();
});
document.getElementById('cc-ticker').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runCC();
});
document.getElementById('leaps-ticker').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runLeaps();
});
document.getElementById('synth-ticker').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runSynth();
});
</script>
